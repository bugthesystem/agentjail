[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[project]
name            = "agentjail"
version         = "0.1.0"
description     = "Python client for the agentjail control plane."
readme          = "README.md"
license         = { text = "MIT" }
requires-python = ">=3.10"
authors         = [{ name = "agentjail contributors" }]
keywords        = ["sandbox", "ai", "agents", "phantom-token", "openai", "anthropic"]
classifiers     = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.27,<1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "mypy>=1.8",
    "ruff>=0.5",
]

[project.urls]
Repository = "https://github.com/bugthesystem/agentjail"

[tool.hatch.build.targets.wheel]
packages = ["src/agentjail"]

[tool.hatch.build.targets.sdist]
include = ["src/agentjail", "README.md", "LICENSE"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-q"

[tool.ruff]
line-length    = 100
target-version = "py310"
[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W"]

[tool.mypy]
python_version        = "3.10"
strict                = true
ignore_missing_imports = true
